  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Guide - Explore Bahawalpur</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body data-bs-theme="light">

    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-map-marked-alt"></i> Terra Guide</a>
            <div class="ms-auto d-flex gap-2">
                <button id="darkModeToggle" class="btn btn-outline-light btn-sm"><i class="fas fa-moon"></i> Dark</button>
                <span class="badge bg-light text-dark">User Panel</span>
            </div>
        </div>
    </nav>

    <div class="container my-4">

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-suitcase-rolling"></i> Tour Packages with Prices</h4>
            </div>
            <div class="card-body">
                <div id="packagesLoading" class="text-center py-2 d-none"><div class="spinner-border spinner-border-sm"></div> Loading packages...</div>
                <div id="packagesError" class="alert alert-danger d-none"></div>
                <div class="row" id="packagesGrid"></div>
            </div>
        </div>

        
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title"><i class="fas fa-landmark"></i> Discover Bahawalpur's Heritage</h2>
                <p class="text-muted">Explore forts, palaces, and desert wonders</p>
                <hr>

                
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Search</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Type place name...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Sort By</label>
                        <select id="sortBy" class="form-select">
                            <option value="name">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="era">Era</option>
                            <option value="fee">Entry Fee (low to high)</option>
                            <option value="fee-desc">Entry Fee (high to low)</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Filter by Era</label>
                        <select id="filterEra" class="form-select">
                            <option value="">All Eras</option>
                            <option value="9th Century">9th Century</option>
                            <option value="1872">1872</option>
                            <option value="13th-15th Century">13th-15th Century</option>
                            <option value="1972">1972</option>
                            <option value="1976">1976</option>
                            <option value="Ancient">Ancient</option>
                            <option value="Geographic region">Geographic region</option>
                            <option value="1493">1493</option>
                            <option value="1904">1904</option>
                            <option value="15th Century">15th Century</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button id="exportCsvBtn" class="btn btn-secondary w-100"><i class="fas fa-file-csv"></i> Export to CSV</button>
                    </div>
                </div>

        
                <div id="loadingSpinner" class="text-center py-4 d-none">
                    <div class="spinner-border text-primary"></div>
                    <p>Loading heritage sites...</p>
                </div>
                <div id="errorMsg" class="alert alert-danger d-none"></div>

                
                <div id="placesGrid" class="row g-4"></div>

                
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <button id="prevPage" class="btn btn-outline-primary" disabled>← Previous</button>
                    <span id="pageInfo" class="text-muted"></span>
                    <button id="nextPage" class="btn btn-outline-primary">Next →</button>
                </div>
            </div>
        </div>

        
        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <h3><i class="fas fa-envelope"></i> Plan Your Visit</h3>
                <form id="inquiryForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name *</label>
                            <input type="text" id="inqName" class="form-control" required>
                            <div class="invalid-feedback">Name required</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" id="inqEmail" class="form-control" required>
                            <div class="invalid-feedback">Valid email required</div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Phone *</label>
                            <input type="tel" id="inqPhone" class="form-control" required pattern="[0-9]{10,13}">
                            <div class="invalid-feedback">10-13 digits</div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Travel Date *</label>
                            <input type="date" id="inqDate" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Interested Place</label>
                            <input type="text" id="inqPlace" class="form-control">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Message</label>
                            <textarea id="inqMessage" rows="2" class="form-control"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send Request</button>
                        </div>
                    </div>
                    <div id="formFeedback" class="mt-3"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
