<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Guide - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-arrow-left me-2"></i>Terra Guide Admin</a>
            <div class="ms-auto">
                <span class="badge bg-danger"><i class="fas fa-user-shield me-1"></i>Admin Panel</span>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        
        <!-- Summary Statistics -->
        <section class="row mb-4" aria-label="Dashboard Statistics">
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body text-center">
                        <h5 class="card-title"><i class="fas fa-map-marker-alt me-1"></i>Total Places</h5>
                        <h2 id="totalPlaces">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body text-center">
                        <h5 class="card-title"><i class="fas fa-calendar-check me-1"></i>Total Bookings</h5>
                        <h2 id="totalBookings">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning mb-3">
                    <div class="card-body text-center">
                        <h5 class="card-title"><i class="fas fa-coins me-1"></i>Avg. Entry Fee (PKR)</h5>
                        <h2 id="avgFee">0</h2>
                    </div>
                </div>
            </div>
        </section>

        <!-- Add / Edit Place Form -->
        <section class="card shadow-sm mb-4" aria-label="Heritage Site Form">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0" id="formTitle"><i class="fas fa-plus-circle me-1"></i>Add New Heritage Site</h5>
            </div>
            <div class="card-body">
                <form id="placeForm">
                    <input type="hidden" id="editId" value="">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Name *</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label">Location *</label>
                            <input type="text" id="location" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="era" class="form-label">Era *</label>
                            <input type="text" id="era" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="image" class="form-label">Image URL</label>
                            <input type="url" id="image" class="form-control" placeholder="https://upload.wikimedia.org/...">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="entryFee" class="form-label">Entry Fee (PKR)</label>
                            <input type="number" id="entryFee" class="form-control" value="0" min="0">
                        </div>
                        <div class="col-12 mb-3">
                            <label for="history" class="form-label">History</label>
                            <textarea id="history" rows="2" class="form-control"></textarea>
                        </div>
                        <div class="col-12 mb-3">
                            <label for="significance" class="form-label">Significance</label>
                            <textarea id="significance" rows="2" class="form-control"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary" id="saveBtn"><i class="fas fa-save me-1"></i>Save Place</button>
                            <button type="button" id="cancelEdit" class="btn btn-secondary d-none"><i class="fas fa-times me-1"></i>Cancel</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        
        <section class="card shadow-sm" aria-label="Manage Heritage Sites">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0"><i class="fas fa-list me-1"></i>Manage Heritage Sites</h5>
            </div>
            <div class="card-body">
                <div id="adminLoading" class="text-center py-3 d-none">
                    <div class="spinner-border"></div>
                    <p class="mt-2">Loading heritage sites...</p>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Location</th><th>Era</th><th>Entry Fee</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="adminPlacesTable"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center py-3 mt-4">
        <p class="text-muted mb-0">&copy; 2026 Terra Guide - Admin Panel. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>

</html>
