<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Guide - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-user-shield"></i> Terra Guide Admin</a>
            <div class="ms-auto">
                <span class="badge bg-danger">Admin Panel</span>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">Total Places</h5>
                        <h2 id="totalPlaces">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">Total Bookings</h5>
                        <h2 id="totalBookings">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h5 class="card-title">Avg. Entry Fee (PKR)</h5>
                        <h2 id="avgFee">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add / Edit Place Form -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white">
                <h5 id="formTitle">Add New Heritage Site</h5>
            </div>
            <div class="card-body">
                <form id="placeForm">
                    <input type="hidden" id="editId" value="">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Name *</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Location *</label>
                            <input type="text" id="location" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Era *</label>
                            <input type="text" id="era" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Image URL</label>
                            <input type="text" id="image" class="form-control" value="https://via.placeholder.com/600">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Entry Fee (PKR)</label>
                            <input type="number" id="entryFee" class="form-control" value="0">
                        </div>
                        <div class="col-12 mb-3">
                            <label>History</label>
                            <textarea id="history" rows="2" class="form-control"></textarea>
                        </div>
                        <div class="col-12 mb-3">
                            <label>Significance</label>
                            <textarea id="significance" rows="2" class="form-control"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary" id="saveBtn">Save Place</button>
                            <button type="button" id="cancelEdit" class="btn btn-secondary d-none">Cancel</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white">
                <h5>Manage Heritage Sites</h5>
            </div>
            <div class="card-body">
                <div id="adminLoading" class="text-center py-3 d-none">
                    <div class="spinner-border"></div>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Location</th><th>Era</th><th>Entry Fee</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="adminPlacesTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
